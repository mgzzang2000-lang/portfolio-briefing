name: 미국주식 스윙 매매실행
on:
  # [2026-07-07] 신설. 미장 정규개장(서머타임 22:30/동절기 23:30 KST) 이후로
  # 23:30 KST 고정 — 항상 개장 이후가 되도록 사용자가 직접 선택한 시각.
  # (스케줄 관련 알려진 이슈는 us-swing-scan.yml 상단 주석 참고)
  schedule:
    - cron: '30 14 * * 1-5'  # 14:30 UTC = 23:30 KST
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  trade:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: us_swing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: 토큰 캐시 복원
        uses: actions/cache/restore@v4
        with:
          path: us_swing/kis_token.json
          key: kis-token-${{ github.run_id }}
          restore-keys: |
            kis-token-
      - name: 매수/매도 실행 (실주문)
        env:
          KIS_APP_KEY:     ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET:  ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO:  ${{ secrets.KIS_ACCOUNT_NO }}
        run: python trade_execution.py
      - name: 토큰 캐시 저장
        if: always()
        uses: actions/cache/save@v4
        with:
          path: us_swing/kis_token.json
          key: kis-token-${{ github.run_id }}
      - name: 상태 커밋
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # [2026-07-18] trade_execution.py와 position_monitor.py가 동시에 커밋해서
          # 생기던 push 충돌을 기존엔 rebase 재시도로 처리했는데, JSON 파일이라 텍스트
          # 기반 rebase가 충돌하면 사람 개입 없이는 안 풀려서 그 사이클 커밋이 통째로
          # 유실됨(DOC 22주 매수기록 유실 사고). 국내봇의 dashboard_merge.py와 동일하게
          # 병합 드라이버를 등록하고 rebase 대신 merge로 전환 — 이 드라이버는 항상
          # 저장소 최상위 경로 기준으로 실행되므로 us_swing/ 접두사 필요(실측 확인함).
          git config merge.portfolio-merge.name "Portfolio state semantic JSON merge"
          git config merge.portfolio-merge.driver "python us_swing/portfolio_merge.py %O %A %B"
          git add portfolio_state.json
          git diff --cached --quiet || git commit -m "chore: 미국주식 스윙 포지션 업데이트 (매매실행) [skip ci]"
          for i in 1 2 3 4 5; do
            git push && exit 0
            git fetch origin main
            git merge origin/main -m "merge: 포지션 동기화 [skip ci]" || {
              git add portfolio_state.json
              git commit --no-edit
            }
            sleep 3
          done
          git push
