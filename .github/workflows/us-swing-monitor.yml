name: 미국주식 스윙 포지션 모니터링
on:
  # [2026-07-07] 신설. 미장 정규시간대(서머타임 13:30-20:00 UTC / 동절기
  # 14:30-21:00 UTC)를 여유있게 덮도록 13-21시(UTC) 매시간. 30주선 이탈
  # 청산은 주봉 데이터라 여기서 안 보고 scan_signals.py가 밤에 확인 —
  # 여긴 급락 대비 하드손절(-8% 등)만 실시간으로 확인.
  schedule:
    - cron: '0 13-21 * * 1-5'
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  monitor:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: us_swing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: 토큰 캐시 복원
        uses: actions/cache/restore@v4
        with:
          path: us_swing/kis_token.json
          key: kis-token-${{ github.run_id }}
          restore-keys: |
            kis-token-
      - name: 손절 확인 (실주문 가능)
        env:
          KIS_APP_KEY:     ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET:  ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO:  ${{ secrets.KIS_ACCOUNT_NO }}
        run: python position_monitor.py
      - name: 토큰 캐시 저장
        if: always()
        uses: actions/cache/save@v4
        with:
          path: us_swing/kis_token.json
          key: kis-token-${{ github.run_id }}
      - name: 상태 커밋
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # [2026-07-18] trade_execution.py와 동시 커밋 충돌 시 rebase 재시도가
          # JSON 파일 특성상 사람 개입 없이는 안 풀려 커밋이 통째로 유실되던 사고
          # (DOC 22주 매수기록 유실) 재발방지 — merge 드라이버 등록 후 merge로 전환.
          git config merge.portfolio-merge.name "Portfolio state semantic JSON merge"
          git config merge.portfolio-merge.driver "python us_swing/portfolio_merge.py %O %A %B"
          git add portfolio_state.json
          git diff --cached --quiet || git commit -m "chore: 미국주식 스윙 포지션 업데이트 (손절 모니터링) [skip ci]"
          for i in 1 2 3 4 5; do
            git push && exit 0
            git fetch origin main
            git merge origin/main -m "merge: 포지션 동기화 [skip ci]" || {
              git add portfolio_state.json
              git commit --no-edit
            }
            sleep 3
          done
          git push
