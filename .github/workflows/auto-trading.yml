# [2026-07-05] GitHub Actions 스케줄 트리거는 5분이 최소 간격이라 */1은 무의미함.
# 대신 트리거 사이(5분)를 스크립트 안에서 60초 간격 5회 반복으로 채워서
# 체감상 1분 간격 매매를 구현함 (아래 '매매 실행' 스텝 참고).
name: 자동매매
on:
  schedule:
    - cron: '*/5 0-6 * * 1-5'
  workflow_dispatch:
concurrency:
  group: trading
  cancel-in-progress: false
permissions:
  contents: write
jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: 토큰 캐시 복원
        uses: actions/cache/restore@v4
        with:
          path: kis_token.json
          key: kis-token-${{ github.run_id }}
          restore-keys: |
            kis-token-
      - name: 매매 실행 (60초 간격 5회 반복 = 체감 1분 간격)
        env:
          KIS_APP_KEY:         ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET:      ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO:      ${{ secrets.KIS_ACCOUNT_NO }}
          KAKAO_CLIENT_ID:     ${{ secrets.KAKAO_CLIENT_ID }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
        run: |
          for i in 1 2 3 4 5; do
            python auto_trading.py
            if [ $i -lt 5 ]; then sleep 60; fi
          done
      - name: 토큰 캐시 저장
        if: always()
        uses: actions/cache/save@v4
        with:
          path: kis_token.json
          key: kis-token-${{ github.run_id }}
      - name: 대시보드 데이터 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard_data.json
          git diff --cached --quiet || git commit -m "chore: update dashboard data [skip ci]"
          # [2026-07-06] 실행 도중(최대 7분) 다른 커밋이 먼저 push되면 non-fast-forward로
          # 거절될 수 있어, 최신 main을 rebase로 받아서 재시도
          for i in 1 2 3 4 5; do
            git push && exit 0
            git fetch origin main
            git rebase origin/main
            sleep 3
          done
          git push
