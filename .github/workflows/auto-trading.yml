# [2026-07-05] GitHub Actions 스케줄 트리거는 5분이 최소 간격이라 */1은 무의미함.
# 대신 트리거 사이(5분)를 스크립트 안에서 60초 간격 5회 반복으로 채워서
# 체감상 1분 간격 매매를 구현함 (아래 '매매 실행' 스텝 참고).
name: 자동매매
on:
  schedule:
    - cron: '*/5 0-6 * * 1-5'
  workflow_dispatch:
concurrency:
  group: trading
  cancel-in-progress: false
permissions:
  contents: write
jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: 토큰 캐시 복원
        uses: actions/cache/restore@v4
        with:
          path: kis_token.json
          key: kis-token-${{ github.run_id }}
          restore-keys: |
            kis-token-
      - name: 일봉 필터 캐시 복원
        uses: actions/cache/restore@v4
        with:
          path: daily_filter_cache.json
          key: daily-filter-${{ github.run_id }}
          restore-keys: |
            daily-filter-
      - name: git 설정 (병합 드라이버 등록)
        # [2026-07-16] 아래 매매 실행 루프 안에서도 pull/merge를 하므로, 마지막
        # 푸시 스텝에서만 등록하던 걸 앞으로 옮김 — 이 설정은 매 실행마다 새로
        # 체크아웃되므로 매번 등록해야 함(커밋으로 저장 불가).
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config merge.dashboard-merge.name "Dashboard semantic JSON merge"
          git config merge.dashboard-merge.driver "python dashboard_merge.py %O %A %B"
          git config merge.ours.driver true
      - name: 매매 실행 (60초 간격 5회 반복 = 체감 1분 간격)
        env:
          KIS_APP_KEY:         ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET:      ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO:      ${{ secrets.KIS_ACCOUNT_NO }}
          KAKAO_CLIENT_ID:     ${{ secrets.KAKAO_CLIENT_ID }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
        run: |
          # [2026-07-16] 이 잡은 시작할 때 딱 한 번만 체크아웃하고 5회 반복 내내
          # 그 스냅샷으로만 판단해서, concurrency(최대 2개 동시 실행) 상황에서
          # 서로의 매매를 못 보고 각자 실주문을 내는 사고(003280 부분매도를
          # "포지션 없음"으로 오판 → 279570 중복매수, 실손실 -16,770원)가 발생했음.
          # 매 반복마다 최신 상태를 커밋+동기화해서 겹쳐 도는 다른 실행의 매매를
          # 최대 ~60초 안에 알아보도록 한다.
          for i in 1 2 3 4 5; do
            python auto_trading.py
            git add dashboard_data.json
            git diff --cached --quiet || git commit -m "chore: update dashboard data [skip ci]"
            for j in 1 2 3; do
              git push && break
              git fetch origin main
              git merge origin/main -m "merge: 대시보드 동기화 [skip ci]" || {
                git add dashboard_data.json
                git commit --no-edit
              }
              sleep 2
            done
            if [ $i -lt 5 ]; then sleep 60; fi
          done
      - name: 인트라데이 1분봉 수집 + 섀도우 전략 비교 스캔 (실주문 없음)
        # [2026-07-07] collect-intraday.yml은 GitHub 자체 schedule 트리거에만 의존했는데,
        # 이 트리거가 그날 한 번도 발화하지 않는 사고가 발생(외부 cron-job.org가 호출하는
        # 이 워크플로우와 달리 별도 외부 호출자가 없었음). 이미 5분마다 안정적으로 도는
        # 이 잡에 얹어서 매 사이클 수집하도록 변경 — 오히려 15분→5분으로 촘촘해짐.
        # [2026-07-10] 섀도우 스캔(shadow_scan.py)을 별도 스텝으로 분리 실행하면 섀도우가
        # 포착한 종목의 1분봉이 안 쌓이는 공백이 생겨서(백테스트 시도 중 발견), 이제
        # collect_intraday_data.py 안에서 섀도우 스캔까지 실행하고 그 후보 종목들도
        # 워치리스트에 합쳐 1분봉을 함께 수집하도록 통합.
        if: always()
        env:
          KIS_APP_KEY:    ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
        run: python collect_intraday_data.py
      - name: 토큰 캐시 저장
        if: always()
        uses: actions/cache/save@v4
        with:
          path: kis_token.json
          key: kis-token-${{ github.run_id }}
      - name: 일봉 필터 캐시 저장
        if: always()
        uses: actions/cache/save@v4
        with:
          path: daily_filter_cache.json
          key: daily-filter-${{ github.run_id }}
      - name: 대시보드 데이터 푸시
        # git 설정(병합 드라이버 등록)은 위 "git 설정" 스텝에서 이미 완료 — 같은 잡
        # 내에서는 스텝 사이에도 유지되므로 여기서 다시 등록할 필요 없음.
        run: |
          git add dashboard_data.json minute_data/ shadow_data/
          git diff --cached --quiet || git commit -m "chore: update dashboard data [skip ci]"
          # rebase는 충돌 시 ours/theirs 방향이 뒤집혀 merge driver 규칙과 안 맞을 수
          # 있어 merge로 통일 (dashboard_merge.py가 항상 자동으로 합쳐주므로 사람이
          # 볼 충돌 마커 자체가 안 생김 — minute_data/shadow_data는 merge=ours라 그냥
          # 이번 실행 결과를 유지).
          for i in 1 2 3 4 5; do
            git push && exit 0
            git fetch origin main
            git merge origin/main -m "merge: 대시보드 동기화 [skip ci]" || {
              git add dashboard_data.json minute_data/ shadow_data/
              git commit --no-edit
            }
            sleep 3
          done
          git push
