name: Collect Intraday Minute Data

on:
  # [2026-07-07] 이 workflow의 schedule 트리거(GitHub 자체 크론)가 하루 종일 단 한 번도
  # 발화하지 않는 사고 발생. auto-trading.yml은 외부 cron-job.org가 workflow_dispatch로
  # 직접 호출해서 안정적으로 도는 반면, 이 워크플로우엔 그런 외부 호출자가 없어 GH 자체
  # 스케줄러의 지연/드롭에 그대로 노출됐던 게 원인. 수집 로직을 auto-trading.yml 잡
  # 안으로 옮겨 매 5분 사이클마다 실행되게 했으므로, 이 워크플로우는 수동 백필 전용으로만 유지.
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Restore KIS token cache
        uses: actions/cache@v4
        with:
          path: kis_token.json
          key: kis-token-${{ github.run_id }}
          restore-keys: kis-token-

      - name: Collect minute data
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
        run: python collect_intraday_data.py

      - name: Commit collected data
        run: |
          git config user.name "Auto Update"
          git config user.email "actions@github.com"
          # [2026-07-14] auto-trading.yml과 같은 merge=ours 설정 — 충돌해도 사람 개입 없이
          # 자동으로 풀리도록 통일 (minute_data/shadow_data는 어차피 매번 재수집되는 데이터)
          git config merge.ours.driver true
          git add minute_data/ shadow_data/ || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: collect intraday minute data [skip ci]"
            for i in 1 2 3 4 5; do
              git push && exit 0
              git fetch origin main
              git merge origin/main -m "merge: 시세데이터 동기화 [skip ci]" || {
                git add minute_data/ shadow_data/
                git commit --no-edit
              }
              sleep 3
            done
            git push
          else
            echo "변경 없음 - 커밋 스킵"
          fi
