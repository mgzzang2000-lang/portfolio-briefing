<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📈 자동매매 대시보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f0f13; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

  .header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding: 20px 16px 16px; text-align: center; border-bottom: 1px solid #2d3748; }
  .header h1 { font-size: 18px; color: #90cdf4; letter-spacing: 1px; margin-bottom: 4px; }
  .last-updated { font-size: 11px; color: #718096; }

  .container { padding: 16px; max-width: 480px; margin: 0 auto; }

  /* 잔고 카드 */
  .balance-card { background: linear-gradient(135deg, #1e3a5f 0%, #1a2f4a 100%); border-radius: 16px; padding: 24px 20px; margin-bottom: 16px; text-align: center; border: 1px solid #2b4c7e; }
  .balance-label { font-size: 12px; color: #90cdf4; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
  .balance-amount { font-size: 36px; font-weight: 700; letter-spacing: -1px; margin-bottom: 12px; }
  .balance-row { display: flex; justify-content: space-around; }
  .balance-sub { text-align: center; }
  .balance-sub .label { font-size: 11px; color: #718096; margin-bottom: 2px; }
  .balance-sub .value { font-size: 15px; font-weight: 600; }

  /* 차트 */
  .chart-card { background: #1a1a2e; border-radius: 12px; padding: 16px; margin-bottom: 16px; border: 1px solid #2d3748; }
  .chart-card canvas { display: block; width: 100% !important; }
  .chart-empty { text-align: center; padding: 32px 0; color: #4a5568; font-size: 13px; }

  /* 통계 그리드 */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .stat-card { background: #1a1a2e; border-radius: 12px; padding: 16px; border: 1px solid #2d3748; }
  .stat-card .label { font-size: 11px; color: #718096; margin-bottom: 6px; }
  .stat-card .value { font-size: 22px; font-weight: 700; }
  .stat-card .sub { font-size: 11px; color: #718096; margin-top: 2px; }

  /* 포지션 */
  .section-title { font-size: 13px; color: #718096; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
  .position-card { background: #1a1a2e; border-radius: 12px; padding: 16px; margin-bottom: 16px; border: 1px solid #2d3748; }
  .position-empty { text-align: center; padding: 12px; color: #4a5568; font-size: 14px; }
  .position-name { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
  .position-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; }
  .position-row .key { color: #718096; }

  /* 거래 내역 */
  .trades-list { background: #1a1a2e; border-radius: 12px; overflow: hidden; border: 1px solid #2d3748; margin-bottom: 16px; }
  .trade-item { padding: 14px 16px; border-bottom: 1px solid #2d3748; display: flex; align-items: center; gap: 12px; }
  .trade-item:last-child { border-bottom: none; }
  .trade-badge { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .badge-buy { background: #1a3a5c; }
  .badge-sell-win { background: #1a3a2a; }
  .badge-sell-loss { background: #3a1a1a; }
  .trade-info { flex: 1; }
  .trade-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
  .trade-detail { font-size: 11px; color: #718096; }
  .trade-pnl { text-align: right; }
  .trade-pnl .pnl-pct { font-size: 15px; font-weight: 700; }
  .trade-pnl .pnl-amt { font-size: 11px; color: #718096; margin-top: 1px; }
  .no-trades { text-align: center; padding: 24px; color: #4a5568; font-size: 14px; }

  /* 색상 */
  .green { color: #68d391; }
  .red { color: #fc8181; }
  .blue { color: #90cdf4; }
  .gray { color: #a0aec0; }

  /* 로딩 */
  .loading { text-align: center; padding: 60px 20px; color: #4a5568; font-size: 14px; }
  .refresh-btn { display: block; width: 100%; padding: 14px; background: #2d3748; border: none; border-radius: 12px; color: #90cdf4; font-size: 14px; cursor: pointer; margin-bottom: 20px; }
  .refresh-btn:active { background: #3d4f63; }
</style>
</head>
<body>
<div class="header">
  <h1>📈 자동매매 대시보드</h1>
  <div class="last-updated" id="lastUpdated">데이터 불러오는 중...</div>
</div>
<div class="container">
  <div id="content" class="loading">⏳ 데이터 불러오는 중...</div>
</div>

<script>
const DATA_URL = 'https://raw.githubusercontent.com/mgzzang2000-lang/portfolio-briefing/main/dashboard_data.json';
const INITIAL = 500000;
let chartInstance = null;

function fmt(n) {
  return Math.abs(n) >= 10000
    ? (n/10000).toFixed(1) + '만'
    : n.toLocaleString();
}
function fmtFull(n) { return n.toLocaleString() + '원'; }
function sign(n) { return n >= 0 ? '+' : ''; }
function cls(n) { return n >= 0 ? 'green' : 'red'; }

function renderChart(history) {
  const canvas = document.getElementById('balanceChart');
  if (!canvas) return;

  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }

  if (!history || history.length < 2) {
    canvas.parentElement.innerHTML = '<div class="chart-empty">📊 거래 데이터가 쌓이면<br>그래프가 표시됩니다</div>';
    return;
  }

  // 시작잔고를 항상 첫 점으로 포함
  const allPoints = [{date: '시작', balance: INITIAL}, ...history];
  const labels = allPoints.map(h => h.date);
  const values = allPoints.map(h => h.balance);
  const isProfit = values[values.length - 1] >= INITIAL;
  const lineColor = isProfit ? '#68d391' : '#fc8181';
  const fillColor = isProfit ? 'rgba(104,211,145,0.08)' : 'rgba(252,129,129,0.08)';

  chartInstance = new Chart(canvas, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: values,
        borderColor: lineColor,
        backgroundColor: fillColor,
        borderWidth: 2,
        pointRadius: values.length <= 10 ? 4 : 2,
        pointBackgroundColor: lineColor,
        pointBorderColor: 'transparent',
        fill: true,
        tension: 0.3
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      aspectRatio: 2.2,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => {
              const v = ctx.raw;
              const pct = ((v - INITIAL) / INITIAL * 100).toFixed(2);
              return `${v.toLocaleString()}원 (${pct >= 0 ? '+' : ''}${pct}%)`;
            }
          },
          backgroundColor: '#1a1a2e',
          titleColor: '#90cdf4',
          bodyColor: '#e2e8f0',
          borderColor: '#2d3748',
          borderWidth: 1,
          padding: 10
        }
      },
      scales: {
        x: {
          ticks: { color: '#718096', font: { size: 10 }, maxRotation: 0, maxTicksLimit: 7 },
          grid: { color: 'rgba(45,55,72,0.5)' }
        },
        y: {
          ticks: {
            color: '#718096',
            font: { size: 10 },
            callback: v => (v / 10000).toFixed(0) + '만'
          },
          grid: { color: 'rgba(45,55,72,0.5)' }
        }
      }
    }
  });
}

function render(d) {
  const trades = d.trades || [];
  const sells = trades.filter(t => t.action === 'sell');
  const wins = sells.filter(t => t.pnl_pct >= 0);
  const winRate = sells.length ? Math.round(wins.length / sells.length * 100) : 0;
  const totalPnl = sells.reduce((s, t) => s + (t.pnl_amt || 0), 0);
  const currentBalance = d.current_balance || INITIAL;
  const totalPnlPct = ((currentBalance - INITIAL) / INITIAL * 100).toFixed(2);
  const avgWin = wins.length ? Math.round(wins.reduce((s,t)=>s+(t.pnl_pct||0),0)/wins.length*100)/100 : 0;
  const losses = sells.filter(t => t.pnl_pct < 0);
  const avgLoss = losses.length ? Math.round(losses.reduce((s,t)=>s+(t.pnl_pct||0),0)/losses.length*100)/100 : 0;

  // 포지션
  let posHTML = '';
  if (d.position) {
    const p = d.position;
    const pnl = ((p.current_price - p.avg_price) / p.avg_price * 100).toFixed(2);
    posHTML = `
      <div class="position-name">${p.name}</div>
      <div class="position-row"><span class="key">보유수량</span><span>${p.qty}주</span></div>
      <div class="position-row"><span class="key">평균단가</span><span>${fmtFull(p.avg_price)}</span></div>
      <div class="position-row"><span class="key">현재가</span><span>${fmtFull(p.current_price)}</span></div>
      <div class="position-row"><span class="key">평가손익</span><span class="${cls(pnl)}">${sign(pnl)}${pnl}%</span></div>
      <div class="position-row"><span class="key">익절가</span><span class="green">${fmtFull(Math.round(p.avg_price * 1.04))}</span></div>
      <div class="position-row"><span class="key">손절가</span><span class="red">${fmtFull(Math.round(p.avg_price * 0.98))}</span></div>
    `;
  } else {
    posHTML = '<div class="position-empty">현재 보유 포지션 없음</div>';
  }

  // 거래 내역 (최신순 10개)
  const recent = [...trades].reverse().slice(0, 10);
  let tradesHTML = recent.length ? recent.map(t => {
    if (t.action === 'buy') {
      return `<div class="trade-item">
        <div class="trade-badge badge-buy">📥</div>
        <div class="trade-info">
          <div class="trade-name">${t.stock}</div>
          <div class="trade-detail">${t.date} · ${t.qty}주 · ${fmtFull(t.price)}</div>
        </div>
        <div class="trade-pnl"><div class="pnl-pct blue">매수</div><div class="pnl-amt">${fmtFull(t.amount)}</div></div>
      </div>`;
    } else {
      const win = t.pnl_pct >= 0;
      return `<div class="trade-item">
        <div class="trade-badge ${win ? 'badge-sell-win' : 'badge-sell-loss'}">${win ? '📤' : '📉'}</div>
        <div class="trade-info">
          <div class="trade-name">${t.stock}</div>
          <div class="trade-detail">${t.date} · ${t.qty}주 · ${t.reason||''}</div>
        </div>
        <div class="trade-pnl">
          <div class="pnl-pct ${cls(t.pnl_pct)}">${sign(t.pnl_pct)}${t.pnl_pct?.toFixed(2)}%</div>
          <div class="pnl-amt ${cls(t.pnl_amt)}">${sign(t.pnl_amt)}${fmt(t.pnl_amt)}원</div>
        </div>
      </div>`;
    }
  }).join('') : '<div class="no-trades">거래 내역 없음<br><small>내일 장 시작부터 기록됩니다</small></div>';

  document.getElementById('content').innerHTML = `
    <div class="balance-card">
      <div class="balance-label">현재 잔고</div>
      <div class="balance-amount">${fmtFull(currentBalance)}</div>
      <div class="balance-row">
        <div class="balance-sub">
          <div class="label">누적 손익</div>
          <div class="value ${cls(totalPnl)}">${sign(totalPnl)}${fmt(totalPnl)}원</div>
        </div>
        <div class="balance-sub">
          <div class="label">수익률</div>
          <div class="value ${cls(totalPnlPct)}">${sign(totalPnlPct)}${totalPnlPct}%</div>
        </div>
        <div class="balance-sub">
          <div class="label">시작금액</div>
          <div class="value gray">${fmt(INITIAL)}원</div>
        </div>
      </div>
    </div>

    <div class="section-title">잔고 추이</div>
    <div class="chart-card">
      <canvas id="balanceChart"></canvas>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="label">승률</div>
        <div class="value ${winRate >= 50 ? 'green' : 'red'}">${winRate}<span style="font-size:14px">%</span></div>
        <div class="sub">${wins.length}승 ${losses.length}패 (총 ${sells.length}회)</div>
      </div>
      <div class="stat-card">
        <div class="label">총 거래</div>
        <div class="value blue">${trades.length}<span style="font-size:14px">회</span></div>
        <div class="sub">매수 ${trades.filter(t=>t.action==='buy').length} · 매도 ${sells.length}</div>
      </div>
      <div class="stat-card">
        <div class="label">평균 수익</div>
        <div class="value green">+${avgWin}<span style="font-size:14px">%</span></div>
        <div class="sub">익절 평균</div>
      </div>
      <div class="stat-card">
        <div class="label">평균 손실</div>
        <div class="value red">${avgLoss}<span style="font-size:14px">%</span></div>
        <div class="sub">손절 평균</div>
      </div>
    </div>

    <div class="section-title">현재 포지션</div>
    <div class="position-card">${posHTML}</div>

    <div class="section-title">거래 내역</div>
    <div class="trades-list">${tradesHTML}</div>

    <button class="refresh-btn" onclick="loadData()">🔄 새로고침</button>
  `;

  renderChart(d.balance_history || []);

  const ts = d.last_updated ? new Date(d.last_updated).toLocaleString('ko-KR') : '-';
  document.getElementById('lastUpdated').textContent = '마지막 업데이트: ' + ts;
}

async function loadData() {
  try {
    const r = await fetch(DATA_URL + '?t=' + Date.now());
    const d = await r.json();
    render(d);
  } catch(e) {
    document.getElementById('content').innerHTML = `<div class="loading">⚠️ 데이터 불러오기 실패<br><small>${e.message}</small></div>`;
  }
}

loadData();
setInterval(loadData, 5 * 60 * 1000); // 5분마다 자동 갱신
</script>
</body>
</html>
